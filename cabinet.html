<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-bright: #2e2e4e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --accent: #7c6cfa;
    --accent-dim: #7c6cfa22;
    --green: #4ade80;
    --green-dim: #4ade8022;
    --red: #f87171;
    --red-dim: #f8717122;
    --yellow: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Auth Screen ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .auth-box {
    width: 100%;
    max-width: 380px;
  }

  .auth-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .auth-logo span {
    color: var(--accent);
  }

  .auth-title {
    font-size: 24px;
    font-weight: 300;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .auth-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .auth-tab.active {
    background: var(--border);
    color: var(--text);
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-forgot {
    text-align: right;
    margin-top: -6px;
    margin-bottom: 14px;
  }
  .auth-forgot a {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;
  }
  .auth-forgot a:hover { color: var(--accent); }

  /* Reset password modal */
  .reset-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .reset-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    width: 100%;
    max-width: 360px;
  }
  .reset-box h2 {
    font-size: 18px;
    font-weight: 400;
    margin: 0 0 6px;
  }
  .reset-box p {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 24px;
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    color: var(--muted);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 4px;
  }
  .btn-google:hover { border-color: var(--accent); background: var(--surface); }
  .btn-google svg { flex-shrink: 0; }

  .auth-error {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ── Cabinet Screen ── */
  #cabinet-screen { display: none; }

  .topbar {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .topbar-logo span { color: var(--accent); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .user-email {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-ghost:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge-green  { background: var(--green-dim);  color: var(--green); }
  .badge-red    { background: var(--red-dim);    color: var(--red); }
  .badge-yellow { background: #fbbf2422; color: var(--yellow); }
  .badge-muted  { background: var(--border);     color: var(--muted); }

  /* ── Agent status ── */
  .agent-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot-red    { background: var(--red); }
  .dot-yellow { background: var(--yellow); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .agent-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }

  .agent-info strong { color: var(--text); }

  .btn-sm {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-sm:hover { border-color: var(--border-bright); }

  .btn-sm.danger {
    border-color: var(--red-dim);
    color: var(--red);
  }

  .btn-sm.danger:hover { border-color: var(--red); }

  /* ── Model selector ── */
  .model-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  @media (max-width: 520px) {
    .model-grid { grid-template-columns: 1fr; }
  }

  .model-card {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: none;
    text-align: left;
    width: 100%;
  }

  .model-card:hover { border-color: var(--border-bright); }

  .model-card.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .model-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .model-desc {
    font-size: 11px;
    color: var(--muted);
  }

  .model-check {
    float: right;
    color: var(--accent);
    font-size: 14px;
    display: none;
  }

  .model-card.selected .model-check { display: inline; }

  .save-model-btn {
    margin-top: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    display: none;
  }

  .save-model-btn:hover { opacity: 0.85; }
  .save-model-btn.visible { display: inline-block; }

  /* ── Features grid ── */
  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  @media (max-width: 520px) {
    .features-grid { grid-template-columns: 1fr; }
  }

  .feature-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 7px;
  }

  .feature-label {
    font-size: 13px;
    color: var(--text);
  }

  .feature-soon {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .feature-action {
    flex-shrink: 0;
    margin-left: 12px;
  }

  .btn-connect {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-connect:hover { background: var(--accent-dim); }

  .btn-disconnect {
    background: none;
    border: 1px solid var(--red-dim);
    color: var(--red);
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.2s;
    z-index: 100;
    max-width: 300px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red); }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><span>//</span> agent.fibonatty</div>
    <h1 class="auth-title">Личный кабинет</h1>
    <p class="auth-sub">Управление вашим AI-ассистентом</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div id="tab-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="auth-forgot"><a onclick="switchTab('forgot')">Забыли пароль?</a></div>
      <button class="btn-primary" onclick="doLogin()">Войти</button>
      <div class="auth-divider">или</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.772 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Войти через Google
      </button>
    </div>

    <div id="tab-forgot" style="display:none">
      <p style="font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.5">
        Введите email — мы отправим ссылку для сброса пароля.
      </p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-primary" id="forgot-btn" onclick="doForgot()">Отправить письмо</button>
      <div style="text-align:center;margin-top:14px">
        <a onclick="switchTab('login')" style="font-size:12px;color:var(--muted);cursor:pointer">
          ← Вернуться к входу
        </a>
      </div>
    </div>

    <div id="tab-register" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="reg-password" placeholder="Минимум 8 символов" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="doRegister()">Создать аккаунт</button>
      <div class="auth-divider">или</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.772 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Зарегистрироваться через Google
      </button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── Reset Password Modal ── -->
<div class="reset-overlay" id="reset-modal" style="display:none">
  <div class="reset-box">
    <h2>Новый пароль</h2>
    <p>Введите новый пароль для вашего аккаунта.</p>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="reset-password" placeholder="Минимум 8 символов" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" id="reset-password2" placeholder="Повторите пароль" autocomplete="new-password">
    </div>
    <div class="auth-error" id="reset-error"></div>
    <button class="btn-primary" id="reset-btn" onclick="doReset()" style="margin-top:8px">
      Сохранить пароль
    </button>
  </div>
</div>

<!-- ── Cabinet Screen ── -->
<div id="cabinet-screen">
  <div class="topbar">
    <div class="topbar-logo"><span>//</span> agent.fibonatty</div>
    <div class="topbar-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-ghost" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="main">

    <!-- Agent status -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Агент</span>
        <span id="agent-badge" class="badge badge-muted">—</span>
      </div>

      <div class="agent-row">
        <div class="dot" id="status-dot"></div>
        <div class="agent-info" id="agent-info">Загрузка...</div>
        <button class="btn-sm" id="agent-toggle-btn" onclick="toggleAgent()" style="display:none"></button>
      </div>

      <div style="font-size:12px; color:var(--muted)" id="agent-hint"></div>
    </div>

    <!-- Features -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Возможности</span>
      </div>
      <div class="features-grid" id="features-grid"></div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let token = localStorage.getItem('token');
let userId = null;
let statusData = null;

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  const params = new URLSearchParams(location.search);

  // Password reset link: /?reset_token=<token>
  const resetToken = params.get('reset_token');
  if (resetToken) {
    history.replaceState({}, '', '/');
    showResetModal(resetToken);
    return;
  }

  // Google primary auth redirect: /?google_token=<jwt>&google_email=<email>
  const googleToken = params.get('google_token');
  const googleEmail = params.get('google_email');
  if (googleToken) {
    history.replaceState({}, '', '/');
    token = googleToken;
    localStorage.setItem('token', token);
    if (googleEmail) {
      document.getElementById('user-email-display').textContent = googleEmail;
    }
    showCabinet();
    await loadStatus();
    return;
  }

  // Google workspace connect redirect
  if (params.get('google') === 'connected') {
    history.replaceState({}, '', '/');
    if (token) toast('Google успешно подключён', 'success');
  }

  if (token) {
    try {
      const me = await api('GET', '/auth/me');
      userId = me.user_id;
      document.getElementById('user-email-display').textContent = me.email;
      showCabinet();
      await loadStatus();
    } catch {
      localStorage.removeItem('token');
      token = null;
    }
  }
})();

// ── Auth ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-forgot').style.display   = tab === 'forgot'   ? '' : 'none';
  // Hide the Войти/Регистрация tabs when showing forgot form
  document.querySelector('.auth-tabs').style.display = tab === 'forgot' ? 'none' : '';
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('auth-error').style.display = 'none';
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  try {
    const data = await api('POST', '/auth/login', { email, password });
    onAuth(data);
  } catch (e) {
    showAuthError(e.message);
  }
}

async function doRegister() {
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  try {
    const data = await api('POST', '/auth/register', { email, password });
    onAuth(data);
  } catch (e) {
    showAuthError(e.message);
  }
}

function loginWithGoogle() {
  window.location.href = '/auth/google/start';
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showAuthError('Введите email'); return; }
  const btn = document.getElementById('forgot-btn');
  btn.disabled = true;
  btn.textContent = 'Отправляем…';
  try {
    await api('POST', '/auth/password/forgot', { email });
    btn.textContent = 'Письмо отправлено';
    document.getElementById('forgot-email').value = '';
    showAuthError('');
    // Show success inline instead of error style
    const el = document.getElementById('auth-error');
    el.textContent = 'Если этот email зарегистрирован — письмо уже в пути. Проверьте папку «Спам».';
    el.style.display = 'block';
    el.style.background = 'var(--green-dim, #0a1a0a)';
    el.style.borderColor = 'var(--green, #22c55e)';
    el.style.color = 'var(--green, #22c55e)';
  } catch (e) {
    btn.textContent = 'Отправить письмо';
    btn.disabled = false;
    showAuthError(e.message);
  }
}

let _resetToken = null;

function showResetModal(token) {
  _resetToken = token;
  document.getElementById('reset-modal').style.display = 'flex';
}

async function doReset() {
  const pw  = document.getElementById('reset-password').value;
  const pw2 = document.getElementById('reset-password2').value;
  const errEl = document.getElementById('reset-error');
  errEl.style.display = 'none';

  if (pw.length < 8) {
    errEl.textContent = 'Пароль должен быть не менее 8 символов';
    errEl.style.display = 'block'; return;
  }
  if (pw !== pw2) {
    errEl.textContent = 'Пароли не совпадают';
    errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.textContent = 'Сохраняем…';
  try {
    const data = await api('POST', '/auth/password/reset', {
      token: _resetToken,
      new_password: pw,
    });
    document.getElementById('reset-modal').style.display = 'none';
    onAuth(data);
    toast('Пароль успешно изменён', 'success');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Сохранить пароль';
  }
}

function onAuth(data) {
  token = data.token;
  userId = data.user_id;
  localStorage.setItem('token', token);
  document.getElementById('user-email-display').textContent = data.email;
  showCabinet();
  loadStatus();
}

function logout() {
  localStorage.removeItem('token');
  location.reload();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Cabinet ────────────────────────────────────────────────────────────────
function showCabinet() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('cabinet-screen').style.display = 'block';
}

async function loadStatus() {
  try {
    statusData = await api('GET', '/cabinet/status');
    renderStatus();
    renderFeatures();
  } catch (e) {
    console.error('loadStatus error', e);
  }
}

function renderStatus() {
  const inst = statusData.instance;
  const dot  = document.getElementById('status-dot');
  const info = document.getElementById('agent-info');
  const badge = document.getElementById('agent-badge');
  const toggleBtn = document.getElementById('agent-toggle-btn');
  const hint = document.getElementById('agent-hint');

  if (!inst) {
    dot.className = 'dot dot-red';
    info.innerHTML = 'Агент не создан';
    badge.textContent = 'нет';
    badge.className = 'badge badge-muted';
    hint.textContent = 'Обратитесь к администратору для подключения';
    toggleBtn.style.display = 'none';
    return;
  }

  const status = inst.status;
  if (status === 'running') {
    dot.className = 'dot dot-green';
    badge.textContent = 'работает';
    badge.className = 'badge badge-green';
    toggleBtn.textContent = 'Остановить';
    toggleBtn.className = 'btn-sm danger';
    hint.textContent = 'Напишите вашему боту в Telegram';
  } else if (status === 'stopped') {
    dot.className = 'dot dot-red';
    badge.textContent = 'остановлен';
    badge.className = 'badge badge-red';
    toggleBtn.textContent = 'Запустить';
    toggleBtn.className = 'btn-sm';
    hint.textContent = 'Агент остановлен — запустите его чтобы начать работу';
  } else {
    dot.className = 'dot dot-yellow';
    badge.textContent = status;
    badge.className = 'badge badge-yellow';
    toggleBtn.style.display = 'none';
  }

  info.innerHTML = `<strong>${inst.container_name}</strong>`;
  toggleBtn.style.display = 'inline-block';
}

async function toggleAgent() {
  const inst = statusData?.instance;
  if (!inst) return;
  const action = inst.status === 'running' ? 'stop' : 'start';
  try {
    await api('POST', `/cabinet/agent/${action}`);
    await loadStatus();
    toast(action === 'stop' ? 'Агент остановлен' : 'Агент запускается...', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Features ───────────────────────────────────────────────────────────────
function renderFeatures() {
  const features = statusData.features;
  const grid = document.getElementById('features-grid');

  grid.innerHTML = Object.entries(features).map(([key, f]) => {
    let action = '';
    if (f.soon) {
      action = `<span class="badge badge-muted">скоро</span>`;
    } else if (key === 'telegram') {
      if (f.enabled) {
        action = `<button class="btn-disconnect" onclick="disconnectTelegram()">Отключить</button>`;
      } else {
        action = `<button class="btn-connect" onclick="connectTelegram()">Подключить</button>`;
      }
    } else if (key === 'google') {
      if (f.enabled) {
        action = `<button class="btn-disconnect" onclick="disconnectGoogle()">Отключить</button>`;
      } else {
        action = `<button class="btn-connect" onclick="connectGoogle()">Подключить</button>`;
      }
    } else if (f.enabled) {
      action = `<span class="badge badge-green">активно</span>`;
    }

    return `
      <div class="feature-row">
        <div>
          <div class="feature-label">${f.label}</div>
          ${f.soon ? '<div class="feature-soon">в разработке</div>' : ''}
        </div>
        <div class="feature-action">${action}</div>
      </div>
    `;
  }).join('');
}

async function connectTelegram() {
  try {
    const data = await api('POST', '/cabinet/telegram/link/start');
    window.open(data.deep_link_url, '_blank');
    toast(`Откройте @${data.bot_username} и нажмите Start`, 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function disconnectTelegram() {
  try {
    await api('DELETE', '/cabinet/telegram/link');
    await loadStatus();
    toast('Telegram отключён', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

function connectGoogle() {
  if (!userId) return;
  window.location.href = '/oauth/google/start';
}

async function disconnectGoogle() {
  if (!userId) return;
  try {
    await api('DELETE', '/oauth/google');
    await loadStatus();
    toast('Google отключён', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Utils ──────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body)  opts.body = JSON.stringify(body);

  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Enter key в формах
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginTab = document.getElementById('tab-login');
  if (loginTab.style.display !== 'none') doLogin();
  else doRegister();
});
</script>
