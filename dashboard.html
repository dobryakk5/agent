
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #7c5cfc;
    --accent2: #00e5b4;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --text: #e0e0f0;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .logo-text span { color: var(--accent); }

  .header-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }

  .provision-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 40px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 100px 1fr 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 11px; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  /* Platform badge colors */
  .platform-anthropic { border-color: #e8834a !important; }
  .platform-openrouter { border-color: #6366f1 !important; }
  .platform-openai { border-color: #10a37f !important; }

  /* Model hints */
  .model-hints {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .hint-chip {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .hint-chip:hover { border-color: var(--accent); color: var(--text); }

  .btn {
    padding: 10px 20px;
    border: none; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6a4de0; transform: translateY(-1px); }
  .btn-stop { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; font-size: 11px; }
  .btn-stop:hover { background: rgba(255,77,109,0.1); }
  .btn-remove { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; font-size: 11px; }
  .btn-remove:hover { color: var(--danger); border-color: var(--danger); }

  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--surface);
    padding: 12px 16px;
    text-align: left;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
  }
  td { padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:hover td { background: rgba(124,92,252,0.04); }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-running { background: rgba(0,229,180,0.15); color: var(--accent2); }
  .badge-stopped { background: rgba(255,77,109,0.12); color: var(--danger); }
  .badge-creating { background: rgba(255,169,77,0.12); color: var(--warn); }

  .platform-tag {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .pt-anthropic { background: rgba(232,131,74,0.15); color: #e8834a; }
  .pt-openrouter { background: rgba(99,102,241,0.15); color: #818cf8; }
  .pt-openai { background: rgba(16,163,127,0.15); color: #10a37f; }

  .model-cell { font-size: 11px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .actions { display: flex; gap: 8px; }

  .metrics-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .metrics-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    outline: none; cursor: pointer;
  }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-title { font-size: 12px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .peak-label { font-size: 11px; color: #ff4d6d; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .stat-value.warn { color: var(--warn); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px; font-size: 13px;
    z-index: 100; transform: translateY(80px); opacity: 0;
    transition: all 0.3s; max-width: 340px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--accent2); }
  .toast.error { border-left: 3px solid var(--danger); }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  @media (max-width: 900px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .metrics-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">🦞</div>
      <div class="logo-text">Open<span>Claw</span> Admin</div>
    </div>
    <div class="header-status">
      <div class="dot"></div>
      <span id="api-status">connecting...</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Running</div>
      <div class="stat-value green" id="stat-running">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Stopped</div>
      <div class="stat-value warn" id="stat-stopped">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg CPU</div>
      <div class="stat-value" id="stat-cpu">—</div>
    </div>
  </div>

  <!-- Provision form -->
  <div class="section-title">Новый инстанс</div>
  <div class="provision-card">
    <div class="form-grid">

      <div class="field">
        <label>User ID</label>
        <input id="f-uid" type="number" placeholder="42" />
      </div>

      <div class="field">
        <label>Платформа</label>
        <select id="f-platform" onchange="onPlatformChange()">
          <option value="anthropic">Anthropic</option>
          <option value="openrouter">OpenRouter</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>

      <div class="field">
        <label>API Key</label>
        <input id="f-key" type="password" placeholder="sk-ant-..." />
      </div>

      <div class="field" style="grid-column: span 2;">
        <label>LLM Модель</label>
        <input id="f-model" placeholder="anthropic/claude-sonnet-4-6" />
        <div class="model-hints" id="model-hints"></div>
      </div>

      <div class="field">
        <label>Telegram Token</label>
        <input id="f-tg" type="password" placeholder="7123...:AAF..." />
      </div>

    </div>

    <div style="margin-top:16px; display:flex; justify-content:flex-end;">
      <button class="btn btn-primary" onclick="provision()">▶ Запустить инстанс</button>
    </div>
  </div>

  <!-- Instances -->
  <div class="section-title">Инстансы</div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>User ID</th>
          <th>Платформа</th>
          <th>Модель</th>
          <th>Status</th>
          <th>Создан</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="instances-tbody">
        <tr><td colspan="6" class="empty">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Metrics -->
  <div class="metrics-header">
    <div class="section-title" style="margin:0">Метрики</div>
    <select class="metrics-select" id="metrics-uid" onchange="loadMetrics()">
      <option value="">— выбери user_id —</option>
    </select>
    <button class="btn btn-primary" style="padding:8px 14px;font-size:12px" onclick="loadMetrics()">Обновить</button>
  </div>

  <div class="metrics-grid">
    <div class="chart-card">
      <div class="chart-title">CPU % <div class="peak-label" id="cpu-peak"></div></div>
      <canvas id="cpu-chart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">RAM (MB) <div class="peak-label" id="mem-peak"></div></div>
      <canvas id="mem-chart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Net RX (MB)</div>
      <canvas id="netrx-chart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Net TX (MB)</div>
      <canvas id="nettx-chart"></canvas>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Подсказки моделей по платформе
const MODEL_HINTS = {
  anthropic: [
    'anthropic/claude-sonnet-4-6',
    'anthropic/claude-opus-4-6',
    'anthropic/claude-haiku-4-5',
  ],
  openrouter: [
    'openrouter/nvidia/nemotron-3-super-120b-a12b:free',
    'openrouter/google/gemini-2.5-pro:free',
    'openrouter/meta-llama/llama-4-maverick:free',
    'openrouter/anthropic/claude-sonnet-4-6',
    'openrouter/openai/gpt-4o',
  ],
  openai: [
    'openai/gpt-4o',
    'openai/gpt-4o-mini',
    'openai/o3',
  ],
};

const KEY_PLACEHOLDER = {
  anthropic: 'sk-ant-... (или из .env)',
  openrouter: 'sk-or-... (или из .env)',
  openai: 'sk-... (или из .env)',
};

function onPlatformChange() {
  const p = document.getElementById('f-platform').value;
  const modelInput = document.getElementById('f-model');
  const keyInput = document.getElementById('f-key');
  const hints = document.getElementById('model-hints');

  modelInput.value = MODEL_HINTS[p][0] || '';
  keyInput.placeholder = KEY_PLACEHOLDER[p] || 'key...';

  // Подсветка select
  const sel = document.getElementById('f-platform');
  sel.className = `platform-${p}`;

  // Chips
  hints.innerHTML = MODEL_HINTS[p].map(m =>
    `<span class="hint-chip" onclick="document.getElementById('f-model').value='${m}'">${m}</span>`
  ).join('');
}

// Инит
onPlatformChange();

// ── API ──────────────────────────────────────────────────────────────────────

let charts = {};

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3500);
}

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

async function loadInstances() {
  try {
    const data = await api('/instances');
    document.getElementById('api-status').textContent = 'online';

    const running = data.filter(i => i.status === 'running').length;
    const stopped = data.filter(i => i.status === 'stopped').length;
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-running').textContent = running;
    document.getElementById('stat-stopped').textContent = stopped;

    const sel = document.getElementById('metrics-uid');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— выбери user_id —</option>' +
      data.map(i => `<option value="${i.user_id}">${i.user_id} (${i.status})</option>`).join('');
    if (cur) sel.value = cur;

    const tbody = document.getElementById('instances-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Нет инстансов</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(i => {
      const bc = { running: 'badge-running', stopped: 'badge-stopped', creating: 'badge-creating' }[i.status] || 'badge-stopped';
      const platform = i.platform || '—';
      const ptClass = `pt-${platform}`;
      const model = i.llm_model || '—';
      const date = new Date(i.created_at).toLocaleString('ru');
      return `<tr>
        <td>${i.user_id}</td>
        <td><span class="platform-tag ${ptClass}">${platform}</span></td>
        <td class="model-cell" title="${model}">${model}</td>
        <td><span class="badge ${bc}">${i.status}</span></td>
        <td style="color:var(--muted);font-size:11px">${date}</td>
        <td>
          <div class="actions">
            ${i.status === 'running' ? `<button class="btn btn-stop" onclick="stop(${i.user_id})">⏹ Стоп</button>` : ''}
            <button class="btn btn-remove" onclick="remove(${i.user_id})">✕ Удалить</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  } catch(e) {
    document.getElementById('api-status').textContent = 'offline';
  }
}

async function provision() {
  const uid = +document.getElementById('f-uid').value;
  const platform = document.getElementById('f-platform').value;
  const key = document.getElementById('f-key').value.trim();
  const model = document.getElementById('f-model').value.trim();
  const tg = document.getElementById('f-tg').value.trim();

  if (!uid || !model) return toast('Укажи User ID и модель', 'error');

  try {
    await api('/provision', {
      method: 'POST',
      body: JSON.stringify({ user_id: uid, platform, api_key: key, llm_model: model, telegram_bot_token: tg })
    });
    toast(`Инстанс ${uid} запущен (${platform} / ${model})`);
    loadInstances();
  } catch(e) { toast(e.message, 'error'); }
}

async function stop(uid) {
  try {
    await api(`/stop/${uid}`, { method: 'POST' });
    toast(`Инстанс ${uid} остановлен`);
    loadInstances();
  } catch(e) { toast(e.message, 'error'); }
}

async function remove(uid) {
  if (!confirm(`Удалить инстанс ${uid}? Volume с памятью тоже удалится.`)) return;
  try {
    await api(`/remove/${uid}`, { method: 'DELETE' });
    toast(`Инстанс ${uid} удалён`);
    loadInstances();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Charts ───────────────────────────────────────────────────────────────────

function makeChart(id, label, color) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{ label, data: [], borderColor: color, backgroundColor: color + '18',
        borderWidth: 2, pointRadius: 3, pointBackgroundColor: [], tension: 0.3, fill: true }]
    },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#5a5a7a', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8 }, grid: { color: '#1e1e2e' } },
        y: { ticks: { color: '#5a5a7a', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1e1e2e' }, beginAtZero: true }
      }
    }
  });
}

function updateChart(id, labels, values, peakId) {
  const c = charts[id];
  if (!c) return;
  const max = Math.max(...values);
  c.data.labels = labels;
  c.data.datasets[0].data = values;
  c.data.datasets[0].pointBackgroundColor = values.map(v => v === max && max > 0 ? '#ff4d6d' : c.data.datasets[0].borderColor);
  c.update();
  if (peakId && max > 0) document.getElementById(peakId).innerHTML = `▲ Пик: <strong>${max.toFixed(2)}</strong>`;
}

async function loadMetrics() {
  const uid = document.getElementById('metrics-uid').value;
  if (!uid) return;

  if (!charts['cpu-chart']) {
    makeChart('cpu-chart', 'CPU %', '#7c5cfc');
    makeChart('mem-chart', 'RAM MB', '#00e5b4');
    makeChart('netrx-chart', 'RX MB', '#ffa94d');
    makeChart('nettx-chart', 'TX MB', '#74c0fc');
  }

  try {
    const data = await api(`/metrics/${uid}`);
    if (!data.length) { toast('Нет данных', 'error'); return; }

    const rows = [...data].reverse();
    const labels = rows.map(r => new Date(r.recorded_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }));

    updateChart('cpu-chart', labels, rows.map(r => r.cpu_percent), 'cpu-peak');
    updateChart('mem-chart', labels, rows.map(r => r.mem_usage_mb), 'mem-peak');
    updateChart('netrx-chart', labels, rows.map(r => r.net_rx_mb));
    updateChart('nettx-chart', labels, rows.map(r => r.net_tx_mb));

    const avgCpu = (rows.reduce((s,r) => s + r.cpu_percent, 0) / rows.length).toFixed(1);
    document.getElementById('stat-cpu').textContent = avgCpu + '%';
  } catch(e) { toast(e.message, 'error'); }
}

loadInstances();
setInterval(loadInstances, 15000);
</script>
</body>
</html>
